<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Central Terminal</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
text-align:center;
}

.container{
position:relative;
display:inline-block;
margin-top:40px;
}

.ticketimg{
width:900px;
}

.nameLeft{
position:absolute;
top:165px;
left:170px;
font-size:40px;
font-weight:bold;
color:black;
}

.nameRight{
position:absolute;
top:155px;
left:640px;
font-size:28px;
font-weight:bold;
color:black;
}

.ticketNumber{
position:absolute;
top:250px;
left:690px;
font-size:28px;
font-weight:bold;
color:black;
}

button{
background:#00ff9c;
border:none;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

input{
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
padding:8px;
}

</style>
</head>

<body>

<h2>CENTRAL TERMINAL</h2>

<p>Entrer identifiant passager :</p>

<input id="name" placeholder="Pseudo">
<br><br>

<button onclick="generate()">Valider</button>

<br><br>

<div id="ticket" class="container" style="display:none;">

<img src="billet.png" class="ticketimg">

<div id="name1" class="nameLeft"></div>
<div id="name2" class="nameRight"></div>
<div id="ticketNum" class="ticketNumber"></div>

</div>

<script>

function generate(){

let name = document.getElementById("name").value;

// récupérer le dernier numéro
let ticket = localStorage.getItem("ticketNumber");

if(ticket == null){
ticket = 1;
}else{
ticket = parseInt(ticket) + 1;
}

// limiter à 1000
if(ticket > 1000){
ticket = 1;
}

// sauvegarder
localStorage.setItem("ticketNumber", ticket);

// afficher billet
document.getElementById("ticket").style.display = "block";

document.getElementById("name1").innerText = name;
document.getElementById("name2").innerText = name;

// format 0001
let formatted = ticket.toString().padStart(4,'0');

document.getElementById("ticketNum").innerText = "#"+formatted;

}

</script>

</body>
</html>
