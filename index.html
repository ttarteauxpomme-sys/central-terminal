<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Terminal - La Central</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

.container{
position:relative;
display:inline-block;
margin-top:30px;
}

.ticketimg{
width:900px;
}

.nameLeft{
position:absolute;
top:165px;
left:180px;
font-size:38px;
font-weight:bold;
color:black;
}

.nameRight{
position:absolute;
top:150px;
left:640px;
font-size:28px;
font-weight:bold;
color:black;
}

.ticketNumber{
position:absolute;
top:250px;
left:670px;
font-size:28px;
font-weight:bold;
color:black;
}

</style>
</head>

<body>

<h2>Terminal d'embarquement — Autorité : La Central</h2>

<input id="name" placeholder="Entre ton pseudo">
<button onclick="generate()">Générer le billet</button>

<br><br>

<div id="ticket" class="container" style="display:none;">

<img src="billet.png" class="ticketimg">

<div id="name1" class="nameLeft"></div>
<div id="name2" class="nameRight"></div>
<div id="ticketNum" class="ticketNumber"></div>

</div>

<script>

function generate(){

let name = document.getElementById("name").value;

// numéro aléatoire
let ticket = Math.floor(Math.random()*9000)+1000;

document.getElementById("ticket").style.display = "block";

document.getElementById("name1").innerText = name;
document.getElementById("name2").innerText = name;

document.getElementById("ticketNum").innerText = "#"+ticket;

}

</script>

</body>
</html>
