<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Central Terminal</title>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
text-align:center;
}

h1{
margin-top:40px;
letter-spacing:5px;
}

input{
background:black;
border:2px solid #00ff88;
color:#00ff88;
padding:12px;
font-size:18px;
width:300px;
}

button{
background:black;
border:2px solid #00ff88;
color:#00ff88;
padding:10px 25px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#00ff88;
color:black;
}

/* zone billet */

.container{
position:relative;
display:inline-block;
margin-top:40px;
}

.ticketimg{
width:900px;
}

/* nom gauche */

.nameLeft{
position:absolute;
top:175px;
left:650px;
font-size:26px;
font-weight:bold;
color:#000000 !important;
}

/* nom droite */

.nameRight{
position:absolute;
top:120px;
left:999px;
font-size:22px;
font-weight:bold;
color:#000000 !important;
}

/* numero ticket */

.ticketNumber{
position:absolute;
top:260px;
left:1000px;
font-size:24px;
font-weight:bold;
color:#000000 !important;
}

</style>
</head>

<body>

<h1>CENTRAL TERMINAL</h1>

<p>Entrer identifiant passager :</p>

<input id="name" placeholder="Pseudo">

<br><br>

<button onclick="generate()">Valider</button>

<br><br>

<div id="ticket" class="container" style="display:none;">

<img src="billet.png" class="ticketimg">

<div id="name1" class="nameLeft"></div>
<div id="name2" class="nameRight"></div>
<div id="ticketNum" class="ticketNumber"></div>

</div>

<script>

function generate(){

let name = document.getElementById("name").value;

let ticket = localStorage.getItem("ticketNumber");

if(ticket == null){
ticket = 1;
}else{
ticket = parseInt(ticket) + 1;
}

if(ticket > 1000){
ticket = 1;
}

localStorage.setItem("ticketNumber", ticket);

document.getElementById("ticket").style.display = "block";

document.getElementById("name1").innerText = name;
document.getElementById("name2").innerText = name;

let formatted = ticket.toString().padStart(4,'0');

document.getElementById("ticketNum").innerText = "#"+formatted;

}

</script>

</body>

</html>
